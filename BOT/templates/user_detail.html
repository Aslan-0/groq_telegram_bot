<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переписка пользователя {{ user_id }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .back-link {
            color: #667eea;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
            margin-bottom: 15px;
        }

        h1 {
            color: #333;
            font-size: 32px;
        }

        .chat {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-height: 600px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
        }

        .message.user {
            background: #e3f2fd;
            margin-left: 20%;
        }

        .message.assistant {
            background: #f3e5f5;
            margin-right: 20%;
        }

        .message-role {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .message.user .message-role {
            color: #1976d2;
        }

        .message.assistant .message-role {
            color: #7b1fa2;
        }

        .message-text {
            color: #333;
            line-height: 1.5;
        }

        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-link">← Назад к списку</a>
            <h1>💬 Переписка пользователя {{ user_id }}</h1>
        </div>

        <div class="chat">
            {% for msg in conversations %}
            <div class="message {{ msg.role }}">
                <div class="message-role">
                    {% if msg.role == 'user' %}
                        👤 Пользователь
                    {% else %}
                        💙 Алия
                    {% endif %}
                </div>
                <div class="message-text">{{ msg.message }}</div>
                <div class="message-time">{{ msg.created_at.strftime('%d.%m.%Y %H:%M:%S') }}</div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
